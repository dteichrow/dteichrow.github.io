name: substack_sync

on:
  schedule:
    - cron: "27 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/substack-sync.yml"
      - "src/**"
      - "requirements.txt"
      - "content/**"
      - "external/**"
      - "data/**"

permissions:
  contents: write

concurrency:
  group: substack-sync
  cancel-in-progress: false

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync recent Substack posts
        run: python -m src.substack_sync --mode incremental

      - name: Build site
        run: python -m src.build_site --site-base-url /

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts.yml docs
          if git diff --cached --quiet; then
            echo "No content or docs changes to commit"
            exit 0
          fi
          git commit -m "Sync Substack posts and rebuild site"
          git push
