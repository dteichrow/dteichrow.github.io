tools:
  - tool_id: american-epidemic-timeline
    title: American Epidemic Timeline
    tool_type: timeline
    status: live
    status_label: Open now
    summary: A carefully cited timeline of major U.S.-linked epidemics, outbreaks, and public-health turning points.
    evidence_model: Cited entries with confidence labels, archival visuals, uncertainty notes, and careful public-health interpretation
    public_route: tools/american-epidemic-timeline/
    source_path: external/american_epidemic_timeline/index.html + data/american_epidemic_timeline_data.js
    launch_priority: flagship
    keywords: [american epidemics, timeline, public health history, outbreaks, exhibit]
    long_note: The timeline follows major epidemics, public-health turning points, and selected regional outbreaks while keeping uncertain diagnoses and rough counts visibly uncertain.
  - tool_id: pathogen-atlas
    legacy_atlas_id: pathogen-atlas
    title: Pathogen Atlas
    tool_type: atlas
    status: live
    status_label: Source-backed atlas
    summary: A cited digital exhibit about pathogen origins, reservoirs, transmission ecology, historical spread, and evidentiary uncertainty.
    evidence_model: Origin confidence, evidence-type panels, citations, and uncertainty notes
    public_route: atlases/pathogen/
    source_path: external/pathogen_atlas/index.html + external/pathogen_atlas/source_backed_profiles.json
    launch_priority: flagship
    keywords: [pathogen, reservoirs, transmission, origin, uncertainty, infectious disease, spread]
    long_note: The pathogen atlas runs as a dark digital exhibit with confidence labels, evidence-type panels, citations, and explicit uncertainty notes.
  - tool_id: maritime-disease-atlas
    legacy_atlas_id: maritime-disease-atlas
    title: Maritime Disease Atlas
    tool_type: atlas
    status: live
    status_label: Source-backed exhibit
    summary: A cited map-first digital exhibit on ships, ports, quarantine, naval warfare, captivity, trade, migration, and maritime disease ecology.
    evidence_model: Case modules with citations, route confidence, burden notes, uncertainty notes, mechanism filters, and guided-tour narrative
    public_route: atlases/maritime/
    source_path: external/maritime_disease_atlas/index.html + data/maritime_disease_modules.js
    launch_priority: flagship
    keywords: [maritime, ports, ships, quarantine, scurvy, ship fever, yellow fever, migration, exhibit]
    long_note: "This is the main public-history exhibit in the atlas family: an exploratory disease ecology surface with case modules, route confidence labels, and guided-tour and presentation modes for later video adaptation."
  - tool_id: revolutionary-war-atlas
    legacy_atlas_id: revolutionary-war-atlas
    title: Revolutionary War Disease Atlas
    tool_type: atlas
    status: section
    status_label: Historical section
    summary: A historical epidemiology section focused on colonial and Revolutionary-era disease ecology, troop movement, and the public-health constraints around the founding period.
    evidence_model: Essay-linked historical synthesis
    public_route: atlases/revolutionary-war/
    source_path: external/revolutionary_war_atlas/index.html
    launch_priority: historical section
    keywords: [revolutionary war, colonies, smallpox, inoculation, military disease]
    long_note: A structured historical atlas page connecting colonial disease ecology, military movement, smallpox, inoculation, and public-health constraints around the founding period.
  - tool_id: viking-health-atlas
    legacy_atlas_id: viking-health-atlas
    title: Viking Health Atlas
    tool_type: atlas
    status: section
    status_label: Norse-world atlas
    summary: A Norse-world disease and health map that ties Greenland, Vinland, settlement ecology, and pre-Columbian contact arguments into one visual surface.
    evidence_model: Map-based historical synthesis plus linked essays
    public_route: atlases/viking/
    source_path: external/viking-health-map.html
    launch_priority: historical section
    keywords: [viking, norse, greenland, vinland, plague, health]
    long_note: A Norse-world health and disease map connecting Greenland, Vinland, settlement ecology, pre-Columbian contact arguments, and epidemic uncertainty.
